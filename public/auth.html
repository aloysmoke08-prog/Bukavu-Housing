<!doctype html>
<html lang="fr" class="light">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>Bukavu Housing — Connexion & Inscription</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1a3a5c",      // Bleu foncé premium
              accent: "#d4903b",       // Or / Amber
              background: "#0f172a",   // Fond sombre
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              poppins: ["Poppins", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .bg-slide {
        transition: opacity 1.5s ease-in-out;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body class="bg-background text-slate-800 font-sans flex items-center justify-center min-h-screen relative overflow-x-hidden p-4">
    
    <!-- Background Slideshow -->
    <div class="absolute inset-0 z-0">
      <div id="bg-1" class="absolute inset-0 bg-cover bg-center bg-slide opacity-100"></div>
      <div id="bg-2" class="absolute inset-0 bg-cover bg-center bg-slide opacity-0"></div>
      <!-- Overlay sombre -->
      <div class="absolute inset-0 bg-black/55 z-10"></div>
    </div>

    <!-- Container principal -->
    <div class="w-full max-w-[420px] glass-card rounded-[24px] shadow-2xl p-8 z-20 transition-all duration-300 relative">
      
      <!-- En-tête -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-primary/10 rounded-2xl text-primary mb-3">
          <span class="material-symbols-outlined text-4xl">home_work</span>
        </div>
        <h1 class="text-3xl font-poppins font-bold text-primary tracking-tight">Bukavu Housing</h1>
        <p class="text-sm text-slate-600 mt-1 font-medium">Trouvez votre logement idéal à Bukavu</p>
      </div>

      <!-- Sélecteur d'onglet -->
      <div class="flex bg-slate-200/60 p-1 rounded-xl mb-6">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 rounded-lg font-semibold text-sm transition-all bg-primary text-white shadow-sm">
          Connexion
        </button>
        <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-2 rounded-lg font-semibold text-sm transition-all text-slate-700 hover:text-primary">
          Inscription
        </button>
      </div>

      <!-- Cooldown alert -->
      <div id="cooldown-container" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-xs font-semibold rounded-xl text-center flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-sm animate-spin">hourglass_empty</span>
        <span id="cooldown-text">Trop d'échecs. Bloqué pour 30s.</span>
      </div>

      <!-- Formulaire Connexion -->
      <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Adresse Email</label>
          <input id="login-email" type="email" placeholder="nom@exemple.com" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
        </div>
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Mot de passe</label>
            <a href="forgot-password.html" class="text-xs font-semibold text-accent hover:underline">Mot de passe oublié ?</a>
          </div>
          <div class="relative">
            <input id="login-password" type="password" placeholder="••••••••" required
              class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none pr-12 transition-all" />
            <button type="button" onclick="togglePwd('login-password')" class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
              <span class="material-symbols-outlined text-[20px] select-none">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" id="btn-login-submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-semibold text-sm hover:bg-slate-900 transition-colors flex items-center justify-center gap-2 shadow-md">
          <span class="material-symbols-outlined text-[18px]">login</span> Se connecter
        </button>

        <!-- Séparateur -->
        <div class="flex items-center my-4">
          <div class="flex-1 h-px bg-slate-300"></div>
          <span class="px-3 text-xs text-slate-500 font-bold uppercase">ou</span>
          <div class="flex-1 h-px bg-slate-300"></div>
        </div>

        <!-- Google button -->
        <button type="button" onclick="loginGoogle()" class="w-full border border-slate-300 bg-white py-3 rounded-xl font-semibold text-sm text-slate-700 hover:bg-slate-50 transition-colors flex items-center justify-center gap-2 shadow-sm">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google Logo" />
          Continuer avec Google
        </button>
      </form>

      <!-- Formulaire Inscription -->
      <form id="form-signup" onsubmit="handleSignup(event)" class="space-y-4 hidden max-h-[460px] overflow-y-auto pr-1">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Nom complet *</label>
          <input id="signup-name" type="text" placeholder="Ex: Jean Kalimba" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Adresse Email *</label>
          <input id="signup-email" type="email" placeholder="nom@exemple.com" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Numéro WhatsApp *</label>
          <input id="signup-whatsapp" type="tel" placeholder="+243 999 123 456" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
          <p class="text-[10px] text-slate-500 mt-0.5">Format: +243XXXXXXXXX ou 0XXXXXXXXX</p>
        </div>
        
        <!-- Champs optionnels -->
        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Email de contact public (optionnel)</label>
          <input id="signup-contact-email" type="email" placeholder="contact@exemple.com"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Téléphone secondaire (optionnel)</label>
          <input id="signup-secondary-phone" type="tel" placeholder="+243..."
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Mot de passe *</label>
          <div class="relative">
            <input id="signup-password" type="password" placeholder="Min. 8 caractères" required oninput="checkPasswordStrength(this.value)"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none pr-12 transition-all" />
            <button type="button" onclick="togglePwd('signup-password')" class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
              <span class="material-symbols-outlined text-[20px] select-none">visibility</span>
            </button>
          </div>
          
          <!-- Barre d'indicateur de force -->
          <div class="mt-2">
            <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
              <div id="strength-bar" class="h-full w-0 bg-red-500 transition-all duration-300"></div>
            </div>
            <p id="strength-label" class="text-[10px] font-bold text-slate-500 mt-1">Force : Trop court</p>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Confirmer mot de passe *</label>
          <div class="relative">
            <input id="signup-password-confirm" type="password" placeholder="Répéter le mot de passe" required
              class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none pr-12 transition-all" />
            <button type="button" onclick="togglePwd('signup-password-confirm')" class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
              <span class="material-symbols-outlined text-[20px] select-none">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-start gap-2 pt-1">
          <input id="signup-tos" type="checkbox" required class="mt-1 accent-primary rounded text-primary focus:ring-primary border-slate-300" />
          <label for="signup-tos" class="text-xs text-slate-600 leading-snug">J'accepte les <a href="conditions.html" target="_blank" class="text-accent font-semibold hover:underline">conditions d'utilisation</a> et la politique de confidentialité.</label>
        </div>

        <button type="submit" id="btn-signup-submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-semibold text-sm hover:bg-slate-900 transition-colors flex items-center justify-center gap-2 shadow-md">
          <span class="material-symbols-outlined text-[18px]">person_add</span> S'inscrire
        </button>
      </form>

    </div>

    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      // Vérifier si connecté
      if (Auth.isLoggedIn()) window.location.href = "accueil.html";

      // 1. Gestionnaire du diaporama de fonds d'écran de Bukavu (rotation toutes les 2 min)
      const bgImages = [
        'images/bukavu1.jpg',
        'images/bukavu2.jpg',
        'images/bukavu3.jpg',
        'images/bukavu4.jpg'
      ];
      let currentBgIdx = 0;
      const bg1 = document.getElementById('bg-1');
      const bg2 = document.getElementById('bg-2');
      let activeBgEl = bg1;

      function testImage(url, callback) {
        const img = new Image();
        img.onload = () => callback(true);
        img.onerror = () => callback(false);
        img.src = url;
      }

      function setBgImage(el, url) {
        el.style.backgroundImage = `url('${url}')`;
      }

      // Initialiser le premier fond
      function initBackground() {
        const firstUrl = bgImages[currentBgIdx];
        testImage(firstUrl, (success) => {
          if (success) setBgImage(bg1, firstUrl);
          else setBgImage(bg1, bgImages[0]); // fallback par défaut
        });
      }
      initBackground();

      // Rotation toutes les 2 minutes (120 000 ms)
      setInterval(() => {
        currentBgIdx = (currentBgIdx + 1) % bgImages.length;
        const nextUrl = bgImages[currentBgIdx];
        const nextBgEl = activeBgEl === bg1 ? bg2 : bg1;

        testImage(nextUrl, (success) => {
          const finalUrl = success ? nextUrl : bgImages[currentBgIdx % bgImages.length];
          setBgImage(nextBgEl, finalUrl);
          
          nextBgEl.style.opacity = '1';
          activeBgEl.style.opacity = '0';
          activeBgEl = nextBgEl;
        });
      }, 120000);

      // 2. Récupérer l'ID client Google
      let GOOGLE_CLIENT_ID = "";
      fetch(API_URL + "/config")
        .then((res) => res.json())
        .then((data) => {
          GOOGLE_CLIENT_ID = data.googleClientId || "";
        })
        .catch(() => {});

      // 3. Rate limiting côté client (5 tentatives max, blocage 30s)
      let failedAttempts = parseInt(localStorage.getItem('failed_attempts') || '0');
      let cooldownUntil = parseInt(localStorage.getItem('cooldown_until') || '0');

      function checkCooldown() {
        const now = Date.now();
        if (cooldownUntil && now < cooldownUntil) {
          const timeLeft = Math.ceil((cooldownUntil - now) / 1000);
          showCooldown(timeLeft);
          return true;
        }
        hideCooldown();
        return false;
      }

      function recordFailedAttempt() {
        failedAttempts++;
        localStorage.setItem('failed_attempts', failedAttempts);
        if (failedAttempts >= 5) {
          const cooldownPeriod = 30 * 1000; // 30 secondes
          cooldownUntil = Date.now() + cooldownPeriod;
          localStorage.setItem('cooldown_until', cooldownUntil);
          checkCooldown();
          Swal.fire({
            icon: 'error',
            title: 'Compte bloqué temporairement',
            text: 'Trop de tentatives infructueuses. Veuillez patienter 30 secondes.',
            confirmButtonColor: '#1a3a5c'
          });
        }
      }

      function resetFailedAttempts() {
        failedAttempts = 0;
        cooldownUntil = 0;
        localStorage.removeItem('failed_attempts');
        localStorage.removeItem('cooldown_until');
        hideCooldown();
      }

      let cooldownInterval;
      function showCooldown(seconds) {
        document.getElementById('cooldown-container').classList.remove('hidden');
        document.getElementById('btn-login-submit').disabled = true;
        document.getElementById('btn-signup-submit').disabled = true;
        
        clearInterval(cooldownInterval);
        cooldownInterval = setInterval(() => {
          seconds--;
          if (seconds <= 0) {
            clearInterval(cooldownInterval);
            resetFailedAttempts();
          } else {
            document.getElementById('cooldown-text').textContent = `Trop de tentatives. Bloqué pour ${seconds}s.`;
          }
        }, 1000);
        
        document.getElementById('cooldown-text').textContent = `Trop de tentatives. Bloqué pour ${seconds}s.`;
      }

      function hideCooldown() {
        document.getElementById('cooldown-container').classList.add('hidden');
        document.getElementById('btn-login-submit').disabled = false;
        document.getElementById('btn-signup-submit').disabled = false;
        clearInterval(cooldownInterval);
      }

      // Lancer la vérification initiale
      checkCooldown();

      // 4. Force du mot de passe en direct
      window.checkPasswordStrength = function(pwd) {
        const bar = document.getElementById('strength-bar');
        const label = document.getElementById('strength-label');
        
        if (!pwd) {
          bar.className = 'h-full w-0 transition-all';
          label.textContent = 'Force : Trop court';
          return;
        }

        let score = 0;
        if (pwd.length >= 8) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;

        if (pwd.length < 8) {
          bar.className = 'h-full w-1/4 bg-red-500 transition-all';
          label.textContent = 'Force : Trop court (min. 8 car.)';
          label.className = 'text-[10px] font-bold text-red-500 mt-1';
        } else if (score <= 2) {
          bar.className = 'h-full w-2/4 bg-orange-500 transition-all';
          label.textContent = 'Force : Faible 🔴';
          label.className = 'text-[10px] font-bold text-orange-500 mt-1';
        } else if (score === 3) {
          bar.className = 'h-full w-3/4 bg-yellow-500 transition-all';
          label.textContent = 'Force : Moyen 🟡';
          label.className = 'text-[10px] font-bold text-yellow-600 mt-1';
        } else {
          bar.className = 'h-full w-full bg-green-500 transition-all';
          label.textContent = 'Force : Fort 🟢';
          label.className = 'text-[10px] font-bold text-green-600 mt-1';
        }
      }

      // 5. Sanitization basique des entrées
      function sanitize(str) {
        return str.replace(/[&<>"']/g, function(m) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
        }).trim();
      }

      // Toggle visibilité du mot de passe
      window.togglePwd = function(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      };

      // Changement d'onglet
      window.switchTab = function(tab) {
        document.getElementById("form-login").classList.toggle("hidden", tab !== "login");
        document.getElementById("form-signup").classList.toggle("hidden", tab !== "signup");
        
        document.getElementById("tab-login").className = tab === "login"
          ? "flex-1 py-2 rounded-lg font-semibold text-sm transition-all bg-primary text-white shadow-sm"
          : "flex-1 py-2 rounded-lg font-semibold text-sm transition-all text-slate-700 hover:text-primary";
          
        document.getElementById("tab-signup").className = tab === "signup"
          ? "flex-1 py-2 rounded-lg font-semibold text-sm transition-all bg-primary text-white shadow-sm"
          : "flex-1 py-2 rounded-lg font-semibold text-sm transition-all text-slate-700 hover:text-primary";
      };

      // Soumission Connexion
      window.handleLogin = async function(e) {
        e.preventDefault();
        if (checkCooldown()) return;

        const email = sanitize(document.getElementById("login-email").value);
        const password = document.getElementById("login-password").value;

        Swal.fire({
          title: 'Connexion...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        try {
          await Auth.login(email, password);
          resetFailedAttempts();
          Swal.fire({
            icon: 'success',
            title: 'Ravi de vous revoir !',
            text: 'Connexion réussie.',
            timer: 1500,
            showConfirmButton: false
          }).then(() => {
            window.location.href = "accueil.html";
          });
        } catch (err) {
          recordFailedAttempt();
          Swal.fire({
            icon: 'error',
            title: 'Erreur',
            text: err.message || 'Identifiants invalides.'
          });
        }
      };

      // Soumission Inscription
      window.handleSignup = async function(e) {
        e.preventDefault();
        if (checkCooldown()) return;

        const nom = sanitize(document.getElementById("signup-name").value);
        const email = sanitize(document.getElementById("signup-email").value);
        const whatsapp = sanitize(document.getElementById("signup-whatsapp").value);
        const contactEmail = sanitize(document.getElementById("signup-contact-email").value);
        const secondaryPhone = sanitize(document.getElementById("signup-secondary-phone").value);
        const password = document.getElementById("signup-password").value;
        const confirmPassword = document.getElementById("signup-password-confirm").value;

        // Validation WhatsApp
        const phoneRegex = /^(?:\+243|0)[0-9]{9}$/;
        if (!phoneRegex.test(whatsapp)) {
          return Swal.fire({
            icon: 'error',
            title: 'Validation',
            text: 'Le numéro WhatsApp doit commencer par +243 ou 0 suivi de 9 chiffres.'
          });
        }

        if (secondaryPhone && !phoneRegex.test(secondaryPhone)) {
          return Swal.fire({
            icon: 'error',
            title: 'Validation',
            text: 'Le téléphone secondaire doit commencer par +243 ou 0 suivi de 9 chiffres.'
          });
        }

        // Force minimale du mot de passe
        if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password) || !/[^A-Za-z0-9]/.test(password)) {
          return Swal.fire({
            icon: 'error',
            title: 'Mot de passe faible',
            text: 'Le mot de passe doit faire min. 8 caractères, contenir 1 majuscule, 1 chiffre et 1 symbole.'
          });
        }

        if (password !== confirmPassword) {
          return Swal.fire({
            icon: 'error',
            title: 'Confirmation',
            text: 'Les deux mots de passe ne correspondent pas.'
          });
        }

        Swal.fire({
          title: 'Création du compte...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        try {
          await Auth.register(nom, email, password, whatsapp, contactEmail, secondaryPhone);
          resetFailedAttempts();
          Swal.fire({
            icon: 'success',
            title: 'Bienvenue !',
            text: 'Votre compte a été créé avec succès.',
            timer: 2000,
            showConfirmButton: false
          }).then(() => {
            window.location.href = "accueil.html";
          });
        } catch (err) {
          Swal.fire({
            icon: 'error',
            title: 'Erreur',
            text: err.message || 'Erreur lors de l\'inscription.'
          });
        }
      };

      // Connexion Google
      window.loginGoogle = function() {
        if (!GOOGLE_CLIENT_ID) {
          return Swal.fire({
            icon: 'error',
            title: 'Configuration',
            text: 'L\'authentification Google n\'est pas configurée.'
          });
        }
        if (!window.google || !google.accounts || !google.accounts.id) {
          return Swal.fire({
            icon: 'error',
            title: 'Chargement',
            text: 'Le service Google n\'est pas encore prêt. Veuillez réessayer dans quelques secondes.'
          });
        }
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: async (response) => {
            Swal.fire({
              title: 'Connexion Google...',
              allowOutsideClick: false,
              didOpen: () => { Swal.showLoading(); }
            });
            try {
              await Auth.loginGoogle(response.credential);
              Swal.fire({
                icon: 'success',
                title: 'Connexion réussie',
                text: 'Ravi de vous revoir !',
                timer: 1500,
                showConfirmButton: false
              }).then(() => {
                window.location.href = "accueil.html";
              });
            } catch (err) {
              Swal.fire({
                icon: 'error',
                title: 'Connexion Google échouée',
                text: err.message || 'Erreur serveur.'
              });
            }
          },
        });
        google.accounts.id.prompt((notification) => {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            Swal.fire({
              icon: 'warning',
              title: 'Google One Tap',
              text: 'La fenêtre Google One Tap ne s\'est pas affichée. Assurez-vous d\'autoriser les popups pour ce site.'
            });
          }
        });
      };
    </script>
  </body>
</html>
