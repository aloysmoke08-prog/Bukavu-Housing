    <script src="api.js"></script>
    <script>
      Auth.requireAuth();
      const user = Auth.currentUser();
      const avatar = document.getElementById("user-avatar");
      if (user) {
        if (user.avatar_url) {
          avatar.innerHTML = `<img src="${user.avatar_url}" class="w-full h-full object-cover"/>`;
        } else {
          avatar.textContent = (user.nom || user.email || "U")
            .charAt(0)
            .toUpperCase();
        }
      }

      chargerLogements();
      chargerRecents();
      verifierMessagesNonLus();

      async function verifierMessagesNonLus() {
        try {
          const messages = await Users.messages();
          const userObj = Auth.currentUser();
          const unread = messages.some(m => !m.lu && m.destinataire.id === userObj.id);
          document.getElementById("unread-messages-badge").classList.toggle("hidden", !unread);
        } catch (err) {
          console.error(err);
        }
      }

      // Liste des quartiers de Bukavu pour l'autocomplétion
      const quartiersBukavu = [
        'Ibanda', 'Nyalukemba', 'Panzi', 'Ndendere', 'Essence', 
        'Kadutu', 'Nkafu', 'Cimpunda', 'Funu', 'Bagira', 'Kasha', 'Nyakavogo'
      ];

      // Dictionnaire de coordonnées géographiques pour la carte Leaflet
      const NEIGHBORHOOD_COORDS = {
        "ibanda": [-2.5028, 28.8647],
        "nyalukemba": [-2.5090, 28.8750],
        "panzi": [-2.5400, 28.8450],
        "ndendere": [-2.5080, 28.8610],
        "essence": [-2.5150, 28.8480],
        "kadutu": [-2.5130, 28.8410],
        "nkafu": [-2.5030, 28.8350],
        "cimpunda": [-2.5180, 28.8370],
        "funu": [-2.5110, 28.8450],
        "bagira": [-2.4760, 28.8250],
        "kasha": [-2.4900, 28.8050],
        "nyakavogo": [-2.4820, 28.8210]
      };

      // Gestion de l'autocomplétion
      const searchInput = document.getElementById("search-input");
      const autocompleteList = document.getElementById("autocomplete-list");

      searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) {
          autocompleteList.classList.add("hidden");
          return;
        }

        const matches = quartiersBukavu.filter(q => q.toLowerCase().includes(query));
        if (matches.length === 0) {
          autocompleteList.classList.add("hidden");
          return;
        }

        autocompleteList.innerHTML = matches.map(m => `
          <div onclick="selectNeighborhood('${m}')" class="px-5 py-3.5 hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer text-sm font-semibold flex items-center gap-3 text-slate-800 dark:text-slate-200 border-b border-slate-100 dark:border-slate-800 last:border-0 transition-all duration-200">
            <span class="material-symbols-outlined text-amber-500 text-lg">location_on</span>
            <span>${m}</span>
          </div>
        `).join('');

        autocompleteList.classList.remove("hidden");
      });

      window.selectNeighborhood = function(name) {
        searchInput.value = name;
        autocompleteList.classList.add("hidden");
        window.location.href = `resultats.html?q=${encodeURIComponent(name)}`;
      };

      // Cacher la liste si clic à l'extérieur
      document.addEventListener("click", (e) => {
        if (!searchInput.contains(e.target) && !autocompleteList.contains(e.target)) {
          autocompleteList.classList.add("hidden");
        }
      });

      // Gestion de la carte interactive Leaflet
      let map = null;
      let mapMarkers = [];

      window.toggleMapModal = async function() {
        const modal = document.getElementById("map-modal");
        const isOpen = !modal.classList.contains("hidden");
        
        if (isOpen) {
          modal.classList.add("hidden");
        } else {
          modal.classList.remove("hidden");
          setTimeout(() => {
            initMap();
          }, 200);
        }
      };

      async function initMap() {
        // Coordonnées par défaut : Bukavu Centre
        const bukavuCenter = [-2.5028, 28.8647];
        
        if (!map) {
          map = L.map('map-container').setView(bukavuCenter, 13);
          
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);
        } else {
          map.invalidateSize();
        }

        // Nettoyer les anciens marqueurs
        mapMarkers.forEach(m => map.removeLayer(m));
        mapMarkers = [];

        try {
          const { logements } = await Logements.lister({ limit: 100 });
          if (logements && logements.length > 0) {
            logements.forEach(log => {
              const q = (log.quartier || "ibanda").toLowerCase().trim();
              const center = NEIGHBORHOOD_COORDS[q] || bukavuCenter;
              
              // Petit décalage aléatoire pour que les marqueurs du même quartier ne se chevauchent pas
              const lat = center[0] + (Math.random() - 0.5) * 0.005;
              const lng = center[1] + (Math.random() - 0.5) * 0.005;

              const img = log.images && log.images[0]
                ? log.images[0]
                : "https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400";
              const prix = log.prix.toLocaleString("fr-CD") + " " + (log.devise || "CDF") + "/mois";

              const marker = L.marker([lat, lng]).addTo(map);
              
              const popupContent = `
                <div class="w-48 font-sans p-1">
                  <img src="${img}" class="w-full h-24 object-cover rounded-xl mb-2" onerror="this.src='https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400'"/>
                  <h4 class="font-bold text-sm text-slate-900 truncate mb-0.5">${log.titre}</h4>
                  <p class="text-amber-600 font-bold text-xs mb-1">${prix}</p>
                  <p class="text-slate-500 text-[10px] mb-2 flex items-center gap-0.5"><span class="material-symbols-outlined text-[12px]">location_on</span>${log.quartier}</p>
                  <a href="details.html?id=${log.id}" class="block text-center bg-slate-900 text-white dark:bg-amber-500 dark:text-slate-950 text-xs font-bold py-1.5 rounded-lg hover:opacity-90 transition-opacity">Voir les détails</a>
                </div>
              `;
              
              marker.bindPopup(popupContent);
              mapMarkers.push(marker);
            });
          }
        } catch (err) {
          console.error("Erreur d'initialisation de la carte:", err);
        }
      }

      function creerCarte(log, id) {
        const prix =
          log.prix.toLocaleString("fr-CD") +
          " " +
          (log.devise || "CDF") +
          "/mois";
        const img =
          log.images && log.images[0]
            ? log.images[0]
            : "https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400";
        return `
      <div onclick="window.location.href='details.html?id=${id}'"
        class="bg-white dark:bg-slate-900 rounded-3xl overflow-hidden shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-slate-100 dark:border-slate-800/80 hover:shadow-xl transition-all duration-300 cursor-pointer flex flex-col justify-between h-full hover:-translate-y-1">
        <div class="relative aspect-[4/3] w-full overflow-hidden">
          <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${img}" alt="${log.titre}" onerror="this.src='https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400'"/>
          <div class="absolute top-4 left-4 bg-white/95 dark:bg-slate-900/95 backdrop-blur px-3 py-1.5 rounded-xl font-bold text-xs text-primary dark:text-amber-500 shadow-md">${prix}</div>
          <button onclick="toggleFavori(event,'${id}')" class="favoris-btn absolute top-4 right-4 bg-white/90 backdrop-blur-md p-2.5 rounded-full shadow-sm text-slate-500 dark:text-slate-400 active:scale-90 transition-transform hover:text-red-500" data-id="${id}">
            <span class="material-symbols-outlined fav-icon text-[20px]" style="font-variation-settings:'FILL' 0">favorite</span>
          </button>
        </div>
        <div class="p-5 flex-1 flex flex-col justify-between space-y-3">
          <div class="space-y-1.5">
            <div class="flex gap-2">
              <span class="bg-primary/5 text-primary dark:bg-slate-800 dark:text-amber-500 font-bold text-[9px] px-2.5 py-1 rounded-md uppercase tracking-wider">${log.type || "Logement"}</span>
              <span class="bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300 font-bold text-[9px] px-2.5 py-1 rounded-md uppercase tracking-wider">${log.quartier || "Bukavu"}</span>
            </div>
            <h3 class="font-poppins font-bold text-base text-slate-900 dark:text-white truncate leading-snug">${log.titre}</h3>
            <div class="flex items-center text-slate-500 dark:text-slate-400 gap-1">
              <span class="material-symbols-outlined text-[16px] text-amber-500">location_on</span>
              <span class="text-xs font-semibold">${log.quartier}, Bukavu</span>
            </div>
          </div>
          <div class="flex gap-4 pt-3 border-t border-slate-100 dark:border-slate-800 text-slate-500 dark:text-slate-400">
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-[18px] text-primary dark:text-amber-500">bed</span>
              <span class="text-xs font-bold">${log.chambres || 1} Ch.</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-[18px] text-primary dark:text-amber-500">bathtub</span>
              <span class="text-xs font-bold">${log.bains || 1} Bain</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-[18px] text-primary dark:text-amber-500">square_foot</span>
              <span class="text-xs font-bold">${log.superficie || "?"} m²</span>
            </div>
          </div>
        </div>
      </div>`;
      }

      function creerPetiteCarte(log, id) {
        const img =
          log.images && log.images[0]
            ? log.images[0]
            : "https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400";
        const prix =
          log.prix.toLocaleString("fr-CD") + " " + (log.devise || "CDF");
        return `
      <div onclick="window.location.href='details.html?id=${id}'"
        class="flex-none w-64 bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-800/80 active:scale-[0.98] transition-transform cursor-pointer">
        <img class="w-full h-32 object-cover" src="${img}" alt="${log.titre}" onerror="this.src='https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400'"/>
        <div class="p-4 space-y-1">
          <p class="font-bold text-sm text-primary dark:text-white truncate">${log.titre}</p>
          <p class="text-xs text-amber-500 font-bold">${prix}/mois • ${log.superficie || "?"} m²</p>
          <p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-0.5">
            <span class="material-symbols-outlined text-[14px]">location_on</span>${log.quartier}
          </p>
        </div>
      </div>`;
      }

      async function chargerLogements(typeFiltre = "tous") {
        const skel = document.getElementById("skeleton-recommandes");
        const container = document.getElementById("cards-recommandes");
        skel.classList.remove("hidden");
        container.classList.add("hidden");
        container.innerHTML = "";

        try {
          const params = { limit: 6 };
          if (typeFiltre !== "tous") params.type = typeFiltre;
          const { logements } = await Logements.lister(params);

          if (!logements || logements.length === 0) {
            container.innerHTML = `
          <div class="col-span-2 text-center py-12 text-slate-500 dark:text-slate-400">
            <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-700">search_off</span>
            <p class="mt-2 text-sm font-semibold">Aucun logement disponible pour l'instant.</p>
            <p class="text-xs mt-1">Soyez le premier à <a href="publier.html" class="text-primary dark:text-amber-500 underline font-bold">publier un logement</a> !</p>
          </div>`;
          } else {
            logements.forEach((log) => {
              container.innerHTML += creerCarte(log, log.id);
            });
            // Mettre à jour le statut des favoris des cartes affichées
            logements.forEach(async (log) => {
              try {
                const { favori } = await Users.isFavori(log.id);
                const btn = document.querySelector(`.favoris-btn[data-id="${log.id}"]`);
                if (btn) {
                  const icon = btn.querySelector(".fav-icon");
                  icon.style.fontVariationSettings = favori ? "'FILL' 1" : "'FILL' 0";
                  icon.style.color = favori ? "#ba1a1a" : "";
                }
              } catch {}
            });
          }
        } catch (e) {
          console.error(e);
          container.innerHTML = `<div class="col-span-2 text-center py-8 text-red-500 text-sm">Erreur de chargement. Vérifiez votre connexion.</div>`;
        }

        skel.classList.add("hidden");
        container.classList.remove("hidden");
      }

      async function chargerRecents() {
        const container = document.getElementById("cards-recent");
        try {
          const { logements } = await Logements.lister({ limit: 5 });
          if (logements && logements.length > 0) {
            container.innerHTML = "";
            logements.forEach((log) => {
              container.innerHTML += creerPetiteCarte(log, log.id);
            });
          }
        } catch (e) {
          console.error(e);
        }
      }

      window.filtrerType = function (btn, type) {
        document.querySelectorAll(".filtre-btn").forEach((b) => {
          b.className = "filtre-btn flex items-center gap-2 bg-slate-100 text-slate-700 dark:bg-slate-900 dark:text-slate-300 px-5 py-2.5 rounded-full whitespace-nowrap hover:bg-slate-200 transition-colors font-bold text-xs uppercase tracking-wider shadow-sm";
        });
        btn.className = "filtre-btn flex items-center gap-2 bg-primary text-white dark:bg-amber-500 dark:text-slate-900 px-5 py-2.5 rounded-full whitespace-nowrap active:scale-95 transition-all font-bold text-xs uppercase tracking-wider shadow-md";
        chargerLogements(type);
      };

      window.lancerRecherche = function () {
        const val = document.getElementById("search-input").value.trim();
        if (val) {
          window.location.href = `resultats.html?q=${encodeURIComponent(val)}`;
        } else {
          window.location.href = "resultats.html";
        }
      };

      document
        .getElementById("search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") window.lancerRecherche();
        });

      window.toggleFavori = async function (e, id) {
        e.stopPropagation();
        const btn = document.querySelector(`.favoris-btn[data-id="${id}"]`);
        const icon = btn.querySelector(".fav-icon");
        try {
          const { favori } = await Users.toggleFavori(id);
          icon.style.fontVariationSettings = favori ? "'FILL' 1" : "'FILL' 0";
          icon.style.color = favori ? "#ba1a1a" : "";
          
          const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
          });
          Toast.fire({
            icon: 'success',
            title: favori ? 'Ajouté aux favoris !' : 'Retiré des favoris.'
          });
        } catch (e) {
          console.error(e);
        }
      };
    </script>
  </body>
</html>
