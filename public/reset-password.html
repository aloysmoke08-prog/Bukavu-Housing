<!doctype html>
<html lang="fr" class="light">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>Bukavu Housing — Nouveau mot de passe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1a3a5c",
              accent: "#d4903b",
              background: "#0f172a",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              poppins: ["Poppins", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .glass-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body class="bg-background text-slate-800 font-sans flex items-center justify-center min-h-screen relative p-4">
    
    <!-- Background overlay of Bukavu -->
    <div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600&q=80');">
      <div class="absolute inset-0 bg-black/55"></div>
    </div>

    <!-- Glass card container -->
    <div class="w-full max-w-[420px] glass-card rounded-[24px] shadow-2xl p-8 z-20 transition-all duration-300 relative">
      
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-primary/10 rounded-2xl text-primary mb-3">
          <span class="material-symbols-outlined text-4xl">password</span>
        </div>
        <h1 class="text-2xl font-poppins font-bold text-primary tracking-tight">Réinitialisation</h1>
        <p class="text-sm text-slate-600 mt-1">Saisissez votre nouveau mot de passe</p>
      </div>

      <form id="form-reset" onsubmit="handleReset(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Nouveau mot de passe *</label>
          <div class="relative">
            <input id="reset-password" type="password" placeholder="Min. 8 caractères" required oninput="checkPasswordStrength(this.value)"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none pr-12 transition-all" />
            <button type="button" onclick="togglePwd('reset-password')" class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
              <span class="material-symbols-outlined text-[20px] select-none">visibility</span>
            </button>
          </div>
          
          <!-- Barre de force -->
          <div class="mt-2">
            <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
              <div id="strength-bar" class="h-full w-0 bg-red-500 transition-all duration-300"></div>
            </div>
            <p id="strength-label" class="text-[10px] font-bold text-slate-500 mt-1">Force : Trop court</p>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Confirmer mot de passe *</label>
          <div class="relative">
            <input id="reset-password-confirm" type="password" placeholder="Répéter le mot de passe" required
              class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none pr-12 transition-all" />
            <button type="button" onclick="togglePwd('reset-password-confirm')" class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
              <span class="material-symbols-outlined text-[20px] select-none">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-semibold text-sm hover:bg-slate-900 transition-colors flex items-center justify-center gap-2 shadow-md">
          <span class="material-symbols-outlined text-[18px]">save</span> Enregistrer le mot de passe
        </button>
      </form>

    </div>

    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="api.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        Swal.fire({
          icon: 'error',
          title: 'Accès interdit',
          text: 'Aucun token de réinitialisation fourni.',
          confirmButtonColor: '#1a3a5c'
        }).then(() => {
          window.location.href = "auth.html";
        });
      }

      window.checkPasswordStrength = function(pwd) {
        const bar = document.getElementById('strength-bar');
        const label = document.getElementById('strength-label');
        
        if (!pwd) {
          bar.className = 'h-full w-0 transition-all';
          label.textContent = 'Force : Trop court';
          return;
        }

        let score = 0;
        if (pwd.length >= 8) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;

        if (pwd.length < 8) {
          bar.className = 'h-full w-1/4 bg-red-500 transition-all';
          label.textContent = 'Force : Trop court (min. 8 car.)';
          label.className = 'text-[10px] font-bold text-red-500 mt-1';
        } else if (score <= 2) {
          bar.className = 'h-full w-2/4 bg-orange-500 transition-all';
          label.textContent = 'Force : Faible 🔴';
          label.className = 'text-[10px] font-bold text-orange-500 mt-1';
        } else if (score === 3) {
          bar.className = 'h-full w-3/4 bg-yellow-500 transition-all';
          label.textContent = 'Force : Moyen 🟡';
          label.className = 'text-[10px] font-bold text-yellow-600 mt-1';
        } else {
          bar.className = 'h-full w-full bg-green-500 transition-all';
          label.textContent = 'Force : Fort 🟢';
          label.className = 'text-[10px] font-bold text-green-600 mt-1';
        }
      }

      window.togglePwd = function(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      };

      async function handleReset(e) {
        e.preventDefault();
        const password = document.getElementById("reset-password").value;
        const confirmPassword = document.getElementById("reset-password-confirm").value;

        // Force minimale du mot de passe
        if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password) || !/[^A-Za-z0-9]/.test(password)) {
          return Swal.fire({
            icon: 'error',
            title: 'Mot de passe faible',
            text: 'Le mot de passe doit faire min. 8 caractères, contenir 1 majuscule, 1 chiffre et 1 symbole.'
          });
        }

        if (password !== confirmPassword) {
          return Swal.fire({
            icon: 'error',
            title: 'Confirmation',
            text: 'Les deux mots de passe ne correspondent pas.'
          });
        }

        Swal.fire({
          title: 'Modification en cours...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        try {
          const res = await Auth.resetPassword(token, password);
          Swal.fire({
            icon: 'success',
            title: 'Succès !',
            text: res.message || 'Votre mot de passe a été réinitialisé avec succès.',
            confirmButtonColor: '#1a3a5c'
          }).then(() => {
            window.location.href = "auth.html";
          });
        } catch (err) {
          Swal.fire({
            icon: 'error',
            title: 'Erreur',
            text: err.message || 'Le token de réinitialisation est invalide ou expiré.'
          });
        }
      }
    </script>
  </body>
</html>
