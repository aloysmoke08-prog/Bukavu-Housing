<!doctype html>
<html lang="fr" class="light">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>Bukavu Housing — Mot de passe oublié</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1a3a5c",
              accent: "#d4903b",
              background: "#0f172a",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              poppins: ["Poppins", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .glass-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body class="bg-background text-slate-800 font-sans flex items-center justify-center min-h-screen relative p-4">
    
    <!-- Background overlay of Bukavu -->
    <div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('images/bukavu1.jpg');">
      <div class="absolute inset-0 bg-black/55"></div>
    </div>

    <!-- Glass card container -->
    <div class="w-full max-w-[420px] glass-card rounded-[24px] shadow-2xl p-8 z-20 transition-all duration-300 relative">
      
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-primary/10 rounded-2xl text-primary mb-3">
          <span class="material-symbols-outlined text-4xl">lock_reset</span>
        </div>
        <h1 class="text-2xl font-poppins font-bold text-primary tracking-tight">Mot de passe oublié</h1>
        <p class="text-sm text-slate-600 mt-1">Saisissez votre email pour recevoir un lien de réinitialisation</p>
      </div>

      <form id="form-forgot" onsubmit="handleForgot(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Adresse Email</label>
          <input id="forgot-email" type="email" placeholder="nom@exemple.com" required
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" />
        </div>

        <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-semibold text-sm hover:bg-slate-900 transition-colors flex items-center justify-center gap-2 shadow-md">
          <span class="material-symbols-outlined text-[18px]">send</span> Envoyer le lien
        </button>

        <a href="auth.html" class="block text-center text-xs font-semibold text-accent hover:underline mt-4">
          Retour à la page de connexion
        </a>
      </form>

    </div>

    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="api.js"></script>
    <script>
      async function handleForgot(e) {
        e.preventDefault();
        const email = document.getElementById("forgot-email").value.trim();

        Swal.fire({
          title: 'Envoi en cours...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        try {
          const res = await Auth.forgotPassword(email);
          Swal.fire({
            icon: 'success',
            title: 'Lien envoyé !',
            text: res.message || 'Si l\'adresse e-mail existe, un e-mail avec un lien a été envoyé.',
            confirmButtonColor: '#1a3a5c'
          }).then(() => {
            window.location.href = "auth.html";
          });
        } catch (err) {
          Swal.fire({
            icon: 'error',
            title: 'Erreur',
            text: err.message || 'Impossible d\'envoyer le lien de réinitialisation.'
          });
        }
      }
    </script>
  </body>
</html>
